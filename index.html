  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ların nereye geldiğini birlikte görmek. Baştan söyle: burada anlatacağım hiçbir şey 'işiniz bitti' demek değil — tam tersi.\" style=\"background:radial-gradient(1300px 780px at 18% 8%, rgba(246,185,59,0.12), transparent 58%), radial-gradient(900px 600px at 92% 96%, rgba(121,224,190,0.07), transparent 60%), #0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:96px 104px 84px;display:flex;flex-direction:column;justify-content:space-between\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:1px;color:#79E0BE\">~/talents-in-action-26 <span style=\"color:#F6B93B\">$<\u002Fspan> ./ai-workshop.sh<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:4px;text-transform:uppercase;color:#F6B93B;margin-bottom:30px\">Women in Tech · AI Workshop<\u002Fdiv>\n      <h1 style=\"font-size:132px;line-height:0.98;font-weight:700;letter-spacing:-4px;margin:0\">AI ve Coding<br>Agents<\u002Fh1>\n      <p style=\"font-size:40px;line-height:1.35;color:#C7CDDB;margin:34px 0 0;max-width:1250px\">Son 3 yılda yazılım nasıl değişti —<br>ve sırada ne var?<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(255,255,255,0.12);padding-top:30px\">\n      <div style=\"font-size:28px;color:#EDF1F9\">Mehmet Cevheri Bozoğlan<span style=\"color:#8B94A9\"> · AI Tech Lead @ PiA<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9\">3 saatlik workshop · 02.07.2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 2 · AGENDA ============ -->\n  <section data-label=\"Akış\" data-screen-label=\"02 Akış\" data-speaker-notes=\"3 saati üç bölüme ayırdık. Önce temel: bir LLM aslında ne, nasıl 'düşünür' — çünkü sihir değil, mimari. Sonra evrim: son 3 yılın dört katmanı. Son bölüm tamamen size ait: bu dünyada nasıl ilerleyeceğiniz. Arada üç işaretçi göreceksiniz: tartışalım = durup birlikte konuşacağız; beraber_deneyelim = ekranda canlı yapacağız; egzersiz = eve/laba götüreceğiniz uygulama.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Bugünkü akış<\u002Fdiv>\n    <h2 style=\"font-size:66px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 52px\">3 saat, üç bölüm<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px\">\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:40px 36px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B;margin-bottom:20px\">Bölüm 1 — Temel<\u002Fdiv>\n        <div style=\"font-size:34px;font-weight:600;line-height:1.2;margin-bottom:16px\">LLM nedir, nasıl \"düşünür\"?<\u002Fdiv>\n        <div style=\"font-size:26px;color:#8B94A9;line-height:1.45\">Leonard Shelby &amp; Memento — statelessness, context, hallucination<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:40px 36px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B;margin-bottom:20px\">Bölüm 2 — Evrim<\u002Fdiv>\n        <div style=\"font-size:34px;font-weight:600;line-height:1.2;margin-bottom:16px\">Dört katman + Loop<\u002Fdiv>\n        <div style=\"font-size:26px;color:#8B94A9;line-height:1.45\">Prompt → Context → Agentic → Harness, ve loop engineering<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:40px 36px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B;margin-bottom:20px\">Bölüm 3 — Sen<\u002Fdiv>\n        <div style=\"font-size:34px;font-weight:600;line-height:1.2;margin-bottom:16px\">Merdiven &amp; yol haritası<\u002Fdiv>\n        <div style=\"font-size:26px;color:#8B94A9;line-height:1.45\">Nereden başlarsın, 2 haftalık egzersiz, değişmeyen temeller<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:16px;margin-top:44px;font-family:'JetBrains Mono',monospace;font-size:24px\">\n      <span style=\"color:#79E0BE\">&gt; tartışalım<\u002Fspan>\n      <span style=\"color:#8B94A9\">·<\u002Fspan>\n      <span style=\"color:#F6B93B\">$ beraber_deneyelim<\u002Fspan>\n      <span style=\"color:#8B94A9\">·<\u002Fspan>\n      <span style=\"color:#C7CDDB\">## egzersiz<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 3 · WHY NOW ============ -->\n  <section data-label=\"Neden şimdi\" data-screen-label=\"03 Neden şimdi\" data-speaker-notes=\"Büyük resim. 1440'ta Gutenberg matbaayı icat etti — kitabın maliyetini çökertti, okuryazarlığı yaygınlaştırdı, Rönesans'ı tetikledi. Boris Cherny'nin de dediği gibi, coding agent'lar yazılım üretmenin maliyetine aynı şeyi yapıyor. Rakamlar somut: Anthropic'te bu yıl yazılan kod 8 katına çıktı, kodun %70-90'ı AI tarafından yazılıyor. Ama en önemli cümle bu: panik değil. Bunu ilk yaşayan kuşak olmak bir şans. Tarih kitaplarına girecek bir anı içeriden görüyorsunuz.\" style=\"background:radial-gradient(1100px 700px at 85% 12%, rgba(246,185,59,0.10), transparent 60%), #0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Neden şimdi?<\u002Fdiv>\n    <h2 style=\"font-size:72px;line-height:1.04;font-weight:700;letter-spacing:-2px;margin:0 0 30px;max-width:1400px\">Bir matbaa anı yaşıyoruz<\u002Fh2>\n    <p style=\"font-size:32px;line-height:1.5;color:#C7CDDB;margin:0 0 auto;max-width:1360px\">1440'ta matbaa kitabın maliyetini düşürdü, okuryazarlığı patlattı, Rönesans'ı tetikledi. Coding agent'lar bugün <span style=\"color:#EDF1F9;font-weight:600\">yazılım üretmenin maliyetini<\u002Fspan> aynı şekilde düşürüyor.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;margin:48px 0 40px\">\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:36px\">\n        <div style=\"font-size:82px;font-weight:700;color:#F6B93B;line-height:1\">8×<\u002Fdiv>\n        <div style=\"font-size:26px;color:#C7CDDB;margin-top:12px;line-height:1.4\">Anthropic'te bu yıl yazılan kod artışı<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:36px\">\n        <div style=\"font-size:82px;font-weight:700;color:#F6B93B;line-height:1\">%70–90<\u002Fdiv>\n        <div style=\"font-size:26px;color:#C7CDDB;margin-top:12px;line-height:1.4\">Bugün AI tarafından yazılan kod oranı<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:36px\">\n        <div style=\"font-size:82px;font-weight:700;color:#F6B93B;line-height:1\">3 yıl<\u002Fdiv>\n        <div style=\"font-size:26px;color:#C7CDDB;margin-top:12px;line-height:1.4\">Bütün bu dönüşümün yaşı<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:30px;color:#79E0BE;font-weight:500\">Panik değil — bunu ilk yaşayan, öğrenen kuşak olma şansı.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 4 · LLM = LEONARD ============ -->\n  <section data-label=\"LLM nedir\" data-screen-label=\"04 LLM nedir\" data-speaker-notes=\"Temel bölümüne giriş. Memento filmini soralım — izleyen var mı? Leonard Shelby anterograd amnezi hastası: 15 dakikadan sonra hiçbir yeni anıyı tutamıyor. Her sabah 'ben kimim, neredeyim' diye uyanıyor. İşte modern LLM'ler tam olarak böyle: stateless. Her sohbet temiz sayfayla başlar. Model 'dün konuştuğumuz' şeyi hatırlamıyor — çünkü hafızası yok. Bu, sihri çözer: AI büyülü değil, mimarisi belli bir sistem. Tartışma molası: gerçekten hatırlıyor mu, yoksa notlarını mı okuyor?\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Temel · 01<\u002Fdiv>\n    <h2 style=\"font-size:66px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 40px\">LLM'i tanıyın: Leonard Shelby<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:1.05fr 0.95fr;gap:44px;align-items:center\">\n      <div>\n        <p style=\"font-size:31px;line-height:1.5;color:#C7CDDB;margin:0 0 26px\"><span style=\"color:#EDF1F9;font-weight:600\">Memento (2000):<\u002Fspan> Leonard anterograd amnezi hastası. 15 dakika sonrası siliniyor. Her sabah \"ben kimim?\" diye uyanıyor.<\u002Fp>\n        <p style=\"font-size:31px;line-height:1.5;color:#C7CDDB;margin:0\">ChatGPT, Claude ve tüm LLM'ler aynı kısıtta: <span style=\"color:#F6B93B;font-weight:600\">stateless<\u002Fspan>. Her sohbet temiz sayfayla başlar. Model, kendiliğinden hiçbir şey \"hatırlamaz\".<\u002Fp>\n        <div style=\"margin-top:34px;font-family:'JetBrains Mono',monospace;font-size:24px;color:#79E0BE\">&gt; tartışalım: AI gerçekten \"hatırlıyor\" mu?<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0E1424;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:34px 36px;font-family:'JetBrains Mono',monospace;font-size:27px;line-height:1.75\">\n        <div style=\"color:#79E0BE\">User:<\u002Fdiv>\n        <div style=\"color:#D6DEEA;margin-bottom:22px\">\"Dün konuştuğumuz projeyi<br>ne düşünüyorsun?\"<\u002Fdiv>\n        <div style=\"color:#F6B93B\">LLM:<\u002Fdiv>\n        <div style=\"color:#D6DEEA\">\"Hangi proje?\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 5 · NOTES / TATTOOS ============ -->\n  <section data-label=\"Notlar &amp; dövmeler\" data-screen-label=\"05 Notlar &amp; dövmeler\" data-speaker-notes=\"Leonard hafızasız ama işlevsel — çünkü bir sistem kurmuş: polaroidler, el yazısı notlar, vücuduna dövmeler. LLM de aynısını yapıyor. Notlar ve polaroidler = prompt ve context (o anki ipuçları). Kalıcı dövmeler = system prompt (asla değişmeyen temel kurallar). 'Don't believe his lies' = hallucination ve prompt injection. Kritik çıkarım: AI'ın 'kişiliği' ona verdiğiniz notlardan doğuyor — ve o notları siz yazıyorsunuz. Yani çıktının kalitesi, verdiğiniz bağlamın kalitesidir.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Temel · 02<\u002Fdiv>\n    <h2 style=\"font-size:66px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 44px\">Hafızası yok — notları var<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:20px;justify-content:center\">\n      <div style=\"display:grid;grid-template-columns:0.9fr 24px 1.1fr;gap:24px;align-items:center;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:30px 36px\">\n        <div style=\"font-size:31px;font-weight:600\">Polaroidler + notlar<\u002Fdiv>\n        <div style=\"color:#F6B93B;font-family:'JetBrains Mono',monospace;font-size:30px\">→<\u002Fdiv>\n        <div style=\"font-size:29px;color:#C7CDDB\"><span style=\"color:#79E0BE;font-family:'JetBrains Mono',monospace\">prompt &amp; context<\u002Fspan> — o anki ipuçları<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:0.9fr 24px 1.1fr;gap:24px;align-items:center;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:30px 36px\">\n        <div style=\"font-size:31px;font-weight:600\">Dövmeler (kalıcı)<\u002Fdiv>\n        <div style=\"color:#F6B93B;font-family:'JetBrains Mono',monospace;font-size:30px\">→<\u002Fdiv>\n        <div style=\"font-size:29px;color:#C7CDDB\"><span style=\"color:#79E0BE;font-family:'JetBrains Mono',monospace\">system prompt<\u002Fspan> — değişmez kurallar<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:0.9fr 24px 1.1fr;gap:24px;align-items:center;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:30px 36px\">\n        <div style=\"font-size:31px;font-weight:600\">\"Don't believe his lies\"<\u002Fdiv>\n        <div style=\"color:#F6B93B;font-family:'JetBrains Mono',monospace;font-size:30px\">→<\u002Fdiv>\n        <div style=\"font-size:29px;color:#C7CDDB\"><span style=\"color:#79E0BE;font-family:'JetBrains Mono',monospace\">hallucination<\u002Fspan> &amp; prompt injection<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:38px;font-size:32px;color:#F6B93B;font-weight:600\">AI'ın kişiliği = ona verdiğin notlar. Ve o notları sen yazıyorsun.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 6 · FOUR LAYERS ============ -->\n  <section data-label=\"Dört katman\" data-screen-label=\"06 Dört katman\" data-speaker-notes=\"Şimdi evrim bölümü. Amirkia'nın güçlü metaforuyla: LLM bir motor (ham güç). Prompt engineering onu ayarlar. Context engineering motorun etrafına arabayı kurar (şasi, hafıza, araçlar). Agentic engineering direksiyonu agent'a devreder — artık işi o sürüyor. Harness engineering ise pisti inşa eder: bariyerler, yol çizgileri, güvenlik. En hızlı araba bile pistsiz kontrolden çıkar. Zaman çizelgesine dikkat: 2023'ten 2026'ya sadece 3 yıl. Ve her katman bir öncekini içine alır — hiçbiri eskimedi.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Evrim · 2023 → 2026<\u002Fdiv>\n    <h2 style=\"font-size:66px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 48px\">Motor, araba, şoför — ve pist<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:22px\">\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #F6B93B;border-radius:16px;padding:34px 28px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">2023–24<\u002Fdiv>\n        <div style=\"font-size:30px;font-weight:700;line-height:1.15;margin-bottom:8px\">Prompt<br>Engineering<\u002Fdiv>\n        <div style=\"font-size:26px;color:#F6B93B;margin-bottom:20px\">Motor<\u002Fdiv>\n        <div style=\"font-size:25px;color:#C7CDDB;line-height:1.4;margin-top:auto\">Doğru soruyu doğru şekilde sor<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #F6B93B;border-radius:16px;padding:34px 28px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">2025<\u002Fdiv>\n        <div style=\"font-size:30px;font-weight:700;line-height:1.15;margin-bottom:8px\">Context<br>Engineering<\u002Fdiv>\n        <div style=\"font-size:26px;color:#F6B93B;margin-bottom:20px\">Araba<\u002Fdiv>\n        <div style=\"font-size:25px;color:#C7CDDB;line-height:1.4;margin-top:auto\">Doğru bilgiyi doğru zamanda ver<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #F6B93B;border-radius:16px;padding:34px 28px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">2025–26<\u002Fdiv>\n        <div style=\"font-size:30px;font-weight:700;line-height:1.15;margin-bottom:8px\">Agentic<br>Engineering<\u002Fdiv>\n        <div style=\"font-size:26px;color:#F6B93B;margin-bottom:20px\">Şoför<\u002Fdiv>\n        <div style=\"font-size:25px;color:#C7CDDB;line-height:1.4;margin-top:auto\">İşi agent'a devret<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #79E0BE;border-radius:16px;padding:34px 28px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">2026<\u002Fdiv>\n        <div style=\"font-size:30px;font-weight:700;line-height:1.15;margin-bottom:8px\">Harness<br>Engineering<\u002Fdiv>\n        <div style=\"font-size:26px;color:#79E0BE;margin-bottom:20px\">Pist<\u002Fdiv>\n        <div style=\"font-size:25px;color:#C7CDDB;line-height:1.4;margin-top:auto\">Sınırları ve güvenliği çiz<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:40px;font-size:29px;color:#8B94A9\">Her katman bir öncekini <span style=\"color:#EDF1F9\">içine alır<\u002Fspan> — hiçbiri eskimedi.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 7 · LAYER 1 PROMPT ============ -->\n  <section data-label=\"Prompt Eng.\" data-screen-label=\"07 Prompt Engineering\" data-speaker-notes=\"Katman 1. Prompt engineering = AI'a doğru soruyu doğru şekilde sormak. 'Act as a senior developer', 'adım adım düşün', birkaç örnek ver (few-shot). Bu dönemde bir fonksiyon debug ettiriyorduk, bir script yazdırıyorduk — ama bütün bir uygulama kuramıyorduk. Motor tek başına yarış kazanmaz. Canlı demo: aynı soruyu iki farklı prompt'la sorup çıktı farkını gösterelim — mesela 'bana kod yaz' vs 'şu kısıtlarla, şu formatta, önce planını açıkla' .\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Katman 1 / 4 · 2023–24<\u002Fdiv>\n    <h2 style=\"font-size:60px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 14px\">Prompt Engineering — motoru ayarla<\u002Fh2>\n    <p style=\"font-size:30px;color:#8B94A9;margin:0 0 40px\">AI'a doğru soruyu doğru şekilde sormayı öğrenmek.<\u002Fp>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start\">\n      <div style=\"display:flex;flex-direction:column;gap:20px\">\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:26px 30px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B\">role prompting<\u002Fspan><div style=\"font-size:27px;color:#C7CDDB;margin-top:8px\">\"Act as a senior Python developer…\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:26px 30px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B\">chain-of-thought<\u002Fspan><div style=\"font-size:27px;color:#C7CDDB;margin-top:8px\">\"Adım adım düşün, sonra cevapla.\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:26px 30px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B\">few-shot<\u002Fspan><div style=\"font-size:27px;color:#C7CDDB;margin-top:8px\">2–3 örnek ver, kalıbı göster.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0E1424;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:32px 34px;font-family:'JetBrains Mono',monospace;font-size:25px;line-height:1.65\">\n        <div style=\"color:#8B94A9\"># zayıf<\u002Fdiv>\n        <div style=\"color:#D6DEEA;margin-bottom:22px\">\"bana bir todo app yaz\"<\u002Fdiv>\n        <div style=\"color:#8B94A9\"># güçlü<\u002Fdiv>\n        <div style=\"color:#79E0BE\">\"Bir todo app'in <span style=\"color:#D6DEEA\">veri modelini<\u002Fspan><br>tasarla ve <span style=\"color:#F6B93B\">neden bu yapıyı<\u002Fspan><br><span style=\"color:#F6B93B\">seçtiğini<\u002Fspan> açıkla.\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:34px;font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B\">$ beraber_deneyelim: aynı soruyu iki farklı prompt'la sor, çıktıyı karşılaştır<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 8 · LAYER 2 CONTEXT ============ -->\n  <section data-label=\"Context Eng.\" data-screen-label=\"08 Context Engineering\" data-speaker-notes=\"Katman 2. Projeler büyüyünce prompt yetmedi: AI diğer dosyalarınızı bilmiyor, olmayan kütüphaneleri uyduruyor, önceki mimari kararları unutuyordu. Context engineering bunu çözdü — AI'a 'göz' ve 'hafıza' kazandırdık. .cursorrules, MCP sunucuları, sub-agent'lar, hafıza özetleme, AGENTS.md. Temel prensip: modelin bağlamına ne koyduğunuz zekasından daha belirleyici. Çöp girerse çöp çıkar; doğru bağlam girerse sıradan bir model bile olağanüstü sonuç üretir. AGENTS.md örneğini göster: projenin kurallarını agent'a öğreten dosya.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Katman 2 / 4 · 2025<\u002Fdiv>\n    <h2 style=\"font-size:60px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 14px\">Context Engineering — arabayı kur<\u002Fh2>\n    <p style=\"font-size:30px;color:#8B94A9;margin:0 0 40px\">AI'a sadece ne istediğini değil, <span style=\"color:#C7CDDB\">neyi bilmesi gerektiğini<\u002Fspan> de söylemek.<\u002Fp>\n    <div style=\"flex:1;display:grid;grid-template-columns:0.95fr 1.05fr;gap:36px;align-items:center\">\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#F6B93B;font-size:26px\">·<\u002Fspan><div style=\"font-size:29px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">.cursorrules / AGENTS.md<\u002Fspan> — proje kuralları<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#F6B93B;font-size:26px\">·<\u002Fspan><div style=\"font-size:29px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">MCP<\u002Fspan> — agent'a araç ve veri bağlama<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#F6B93B;font-size:26px\">·<\u002Fspan><div style=\"font-size:29px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">sub-agent'lar<\u002Fspan> — özelleşmiş görevler<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#F6B93B;font-size:26px\">·<\u002Fspan><div style=\"font-size:29px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">memory<\u002Fspan> — bağlamı özetleyip koruma<\u002Fdiv><\u002Fdiv>\n        <div style=\"margin-top:22px;font-size:29px;color:#79E0BE;font-weight:500\">Garbage in, garbage out.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0E1424;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:30px 34px;font-family:'JetBrains Mono',monospace;font-size:24px;line-height:1.6\">\n        <div style=\"color:#8B94A9\"># AGENTS.md<\u002Fdiv>\n        <div style=\"color:#F6B93B;margin-top:10px\">## Stack<\u002Fdiv>\n        <div style=\"color:#D6DEEA\">Java · Spring Boot · PostgreSQL<\u002Fdiv>\n        <div style=\"color:#F6B93B;margin-top:14px\">## Kurallar<\u002Fdiv>\n        <div style=\"color:#D6DEEA\">- Service katmanı repo'ya bağımlı<\u002Fdiv>\n        <div style=\"color:#D6DEEA\">- Her PR'da test zorunlu<\u002Fdiv>\n        <div style=\"color:#D6DEEA\">- Naming: camelCase<\u002Fdiv>\n        <div style=\"color:#F6B93B;margin-top:14px\">## Dokunma<\u002Fdiv>\n        <div style=\"color:#D6DEEA\">- /legacy dizini<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 9 · LAYER 3 AGENTIC ============ -->\n  <section data-label=\"Agentic Eng.\" data-screen-label=\"09 Agentic Engineering\" data-speaker-notes=\"Katman 3. Artık tek bir chat'le konuşmuyoruz. Agent bir döngü çalıştırıyor: muhakeme et → araç kullan (dosya oku, komut çalıştır) → sonucu gözlemle → tekrarla. Ve tek agent değil: bir agent tasarımı okur, biri kod yazar, biri test yazar, biri review yapar. Boris Cherny'nin çarpıcı sözü: artık kullanıcı Claude'a prompt yazmıyor — başka bir Claude yazıyor. Yani sub-agent'lar başka Claude'lar. Bu koordinasyon becerisi önümüzdeki 2 yılın en değerli yetkinliği.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Katman 3 / 4 · 2025–26<\u002Fdiv>\n    <h2 style=\"font-size:60px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 14px\">Agentic Engineering — direksiyonu devret<\u002Fh2>\n    <p style=\"font-size:30px;color:#8B94A9;margin:0 0 46px\">Tek chat değil; planlayan, araç kullanan, gözlemleyen bir <span style=\"color:#C7CDDB\">döngü<\u002Fspan>.<\u002Fp>\n    <div style=\"flex:1;display:grid;grid-template-columns:1.15fr 0.85fr;gap:40px;align-items:center\">\n      <div style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap\">\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:24px 30px;font-size:29px;font-weight:600\">Muhakeme<\u002Fdiv>\n        <div style=\"color:#F6B93B;font-family:'JetBrains Mono',monospace;font-size:34px\">→<\u002Fdiv>\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:24px 30px;font-size:29px;font-weight:600\">Aksiyon<\u002Fdiv>\n        <div style=\"color:#F6B93B;font-family:'JetBrains Mono',monospace;font-size:34px\">→<\u002Fdiv>\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:24px 30px;font-size:29px;font-weight:600\">Gözlem<\u002Fdiv>\n        <div style=\"color:#79E0BE;font-family:'JetBrains Mono',monospace;font-size:34px;width:100%;text-align:center;margin-top:6px\">↺ tekrarla<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-left:3px solid #F6B93B;padding:14px 0 14px 34px\">\n        <div style=\"font-size:34px;line-height:1.35;color:#EDF1F9;font-style:italic\">\"Kullanıcı artık Claude'a prompt yazmıyor — başka bir Claude yazıyor.\"<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-top:22px\">— Boris Cherny, Claude Code<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10 · LAYER 4 HARNESS ============ -->\n  <section data-label=\"Harness Eng.\" data-screen-label=\"10 Harness Engineering\" data-speaker-notes=\"Katman 4, en yeni. Sorun şu: en hızlı araba bile pistsiz kontrolden çıkar. İlk 10 özellikte her şey harika, ama 20-30'da agent'lar sapıyor: stabil API'leri kırıyor, mimari sınırları 'verimlilik' için aşıyor, teknik borç biriktiriyor. Context'i var ama kısıtlaması yok. Harness engineering = agent'ın çalışacağı ortamı, geri bildirim döngülerini ve kontrol sistemlerini inşa etmek. Dört bileşen: okunabilirlik (her şey repo'da), mekanik kısıtlamalar (katmanlı mimari, linter'lar build'ı kırar), bilgi tabanı (docs/), sürekli temizlik. OpenAI kanıtı: 5 ayda, 3'ten 7 mühendise çıkan ekip, ~1500 PR, 1 milyon satır, TEK satır elle yazılmadan.\" style=\"background:radial-gradient(1000px 640px at 88% 88%, rgba(121,224,190,0.08), transparent 60%), #0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#79E0BE;margin-bottom:22px\">Katman 4 / 4 · 2026<\u002Fdiv>\n    <h2 style=\"font-size:60px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 14px\">Harness Engineering — pisti inşa et<\u002Fh2>\n    <p style=\"font-size:30px;color:#8B94A9;margin:0 0 40px\">Agent hızlı — ama kısıtlaması yoksa <span style=\"color:#C7CDDB\">sapar<\u002Fspan>. Ona bir pist kur.<\u002Fp>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:18px 30px;align-content:center\">\n      <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#79E0BE;font-size:24px\">01<\u002Fspan><div style=\"font-size:28px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">Okunabilirlik<\u002Fspan> — her şey repo içinde<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#79E0BE;font-size:24px\">02<\u002Fspan><div style=\"font-size:28px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">Mekanik kısıtlamalar<\u002Fspan> — katmanlı mimari + linter<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#79E0BE;font-size:24px\">03<\u002Fspan><div style=\"font-size:28px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">Bilgi tabanı<\u002Fspan> — docs/, design doc, spec<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:baseline\"><span style=\"font-family:'JetBrains Mono',monospace;color:#79E0BE;font-size:24px\">04<\u002Fspan><div style=\"font-size:28px;color:#C7CDDB\"><span style=\"color:#EDF1F9;font-weight:600\">Sürekli temizlik<\u002Fspan> — her Cuma teknik borç taraması<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:36px;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:30px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px\">\n      <div style=\"font-size:26px;color:#8B94A9\">OpenAI, 5 ayda:<\u002Fdiv>\n      <div style=\"font-size:30px;font-weight:600\"><span style=\"color:#F6B93B\">~1500<\u002Fspan> PR<\u002Fdiv>\n      <div style=\"font-size:30px;font-weight:600\"><span style=\"color:#F6B93B\">1M<\u002Fspan> satır<\u002Fdiv>\n      <div style=\"font-size:30px;font-weight:600\"><span style=\"color:#F6B93B\">3→7<\u002Fspan> mühendis<\u002Fdiv>\n      <div style=\"font-size:30px;font-weight:600;color:#79E0BE\">0 satır elle kod<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 11 · LOOP ENGINEERING ============ -->\n  <section data-label=\"Loop Eng.\" data-screen-label=\"11 Loop Engineering\" data-speaker-notes=\"Şimdi kendi deneyimim — ekibimle yazdığım Loop Engineering makalesi. Küçük ama gerçek bir multi-model veritabanı inşa ettik: ~200 test, %100 line ve function coverage. Çoğunu otonom bir agent loop'u yazdı; ben başlangıcı izleyip checkpoint'leri doğruladım. Ralph loop'u en sade haliyle şu: PROMPT.md'yi tekrar tekrar agent'a ver. Her tur TAZE context'le başlar — agent önceki turu hatırlamaz, dosyaları ve git geçmişini okuyup durumu yeniden çıkarır. Tek püf nokta: ilerleme modelin hafızasında değil, dosyalarda ve git'te yaşar. Beş parça: DESIGN.md (donmuş spec, insan yargısı burada), IMPLEMENTATION_PLAN.md (atılabilir plan), PROMPT.md (değişmez talimat), gate (typecheck+lint+test+build), runner (while döngüsü).\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Sahadan · benim deneyim<\u002Fdiv>\n    <h2 style=\"font-size:58px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 14px\">Loop Engineering: izleyerek veritabanı inşa etmek<\u002Fh2>\n    <p style=\"font-size:29px;color:#8B94A9;margin:0 0 30px\">~200 test, %100 line/function coverage — çoğunu otonom bir loop yazdı; insan sadece izledi ve doğruladı.<\u002Fp>\n    <div style=\"background:#0E1424;border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:24px 30px;font-family:'JetBrains Mono',monospace;font-size:25px;color:#79E0BE;margin-bottom:26px\">while :; do cat PROMPT.md | claude -p --dangerously-skip-permissions ; done<\u002Fdiv>\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:16px\">\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:24px 22px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B;margin-bottom:12px\">DESIGN.md<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.35\">Donmuş spec — insan yargısı<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:24px 22px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B;margin-bottom:12px\">PLAN.md<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.35\">Atılabilir görev listesi<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:24px 22px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B;margin-bottom:12px\">PROMPT.md<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.35\">Değişmez talimat<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:24px 22px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#79E0BE;margin-bottom:12px\">gate<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.35\">typecheck + lint + test + build<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:24px 22px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#79E0BE;margin-bottom:12px\">runner<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.35\">Döngü + tamamlanma sinyali<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:34px;font-size:30px;color:#F6B93B;font-weight:600\">İlerleme modelin hafızasında değil — dosyalarda ve git'te yaşar.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 12 · HONESTY CONTRACT ============ -->\n  <section data-label=\"Dürüstlük\" data-screen-label=\"12 Dürüstlük sözleşmesi\" data-speaker-notes=\"Loop engineering'in kalbi mekanik değil, ahlaki: dürüstlük sözleşmesi. Otonom agent'ın iki ölümcül hatası var — agentic laziness (erken zafer ilan etmek) ve placeholder implementation (zayıf testi geçen sahte stub). Bunu neden ciddiye almalı? Gerçek bir örnek: loop crash-recovery testlerini yazarken, kendi veritabanımızın her commit'te fsync yaptığını fark etti — yani düz bir 'crash' kaybedecek hiçbir şey bırakmıyor, test aslında hiçbir şeyi test etmiyordu. Agent bunu yakaladı ve bilerek fsync'lenmemiş kısmi bir kayıt enjekte edip gerçek torn-tail recovery yolunu test etti. Sığ bir loop yeşil ama boş bir test gönderirdi. Kural: gate gerçektir, modelin fikri değil. Zayıf gate = kendinden emin çöp.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Loop Engineering · devam<\u002Fdiv>\n    <h2 style=\"font-size:62px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 40px\">Asıl mesele: dürüstlük sözleşmesi<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:stretch\">\n      <div style=\"display:flex;flex-direction:column;gap:18px\">\n        <div style=\"font-size:27px;color:#8B94A9;margin-bottom:2px\">Otonom agent'ın iki ölümcül hatası:<\u002Fdiv>\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:24px 28px\"><div style=\"font-size:29px;font-weight:600;color:#F6B93B\">Agentic laziness<\u002Fdiv><div style=\"font-size:26px;color:#C7CDDB;margin-top:6px\">Erken zafer ilan etmek<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:24px 28px\"><div style=\"font-size:29px;font-weight:600;color:#F6B93B\">Placeholder impl.<\u002Fdiv><div style=\"font-size:26px;color:#C7CDDB;margin-top:6px\">Zayıf testi geçen sahte stub<\u002Fdiv><\u002Fdiv>\n        <div style=\"margin-top:6px;font-size:26px;line-height:1.5;color:#C7CDDB\"><span style=\"color:#79E0BE;font-weight:600\">Kural:<\u002Fspan> testler önce yazılır, asla zayıflatılmaz. Gate gerçektir — modelin fikri değil.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0E1424;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:32px 36px;display:flex;flex-direction:column;justify-content:center\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#79E0BE;margin-bottom:18px\"># gerçek bir an<\u002Fdiv>\n        <p style=\"font-size:28px;line-height:1.5;color:#D6DEEA;margin:0\">Loop, DB'nin her commit'te <span style=\"color:#F6B93B\">fsync<\u002Fspan> yaptığını fark etti — düz bir \"crash\" kaybedecek hiçbir şey bırakmıyordu. Test <span style=\"color:#EDF1F9\">hiçbir şeyi test etmiyordu.<\u002Fspan><\u002Fp>\n        <p style=\"font-size:28px;line-height:1.5;color:#D6DEEA;margin:20px 0 0\">Agent bilerek fsync'lenmemiş bir kayıt enjekte edip <span style=\"color:#79E0BE\">gerçek recovery yolunu<\u002Fspan> test etti.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:32px;font-size:29px;color:#F6B93B;font-weight:600\">Zayıf gate = kendinden emin çöp. Doğrulama olmadan otonomluk yoktur.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 13 · BORIS CHERNY QUOTE ============ -->\n  <section data-label=\"Boris Cherny\" data-screen-label=\"13 Boris Cherny\" data-speaker-notes=\"Bu sadece benim ya da bir makalenin görüşü değil — sektörün en tepesi de burada. Boris Cherny, Anthropic'te Claude Code'un yaratıcısı ve lideri. Haziran 2026'da söylediği söz her şeyi özetliyor: artık Claude'a prompt yazmıyorum, prompt yazan loop'lar çalıştırıyorum; benim işim loop yazmak. 8 aydır elle tek satır kod yazmamış, bazı günler on binlerce agent'ı aynı anda yönetiyor. 'Builder'ın rolü tamamen değişiyor' diyor. Dikkat: bu, işin bittiği değil — işin katman atladığı anlamına geliyor. Loop Engineering makalemin de tam olarak anlattığı şey bu.\" style=\"background:radial-gradient(1200px 760px at 50% 0%, rgba(246,185,59,0.13), transparent 62%), #0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:96px 130px 84px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:40px\">Sektör ne diyor?<\u002Fdiv>\n    <blockquote style=\"font-size:64px;line-height:1.18;font-weight:600;letter-spacing:-1.5px;margin:0;max-width:1500px\">\"Artık Claude'a <span style=\"color:#8B94A9\">prompt yazmıyorum.<\u002Fspan> Prompt yazan <span style=\"color:#F6B93B\">loop'lar<\u002Fspan> çalıştırıyorum. Benim işim <span style=\"color:#F6B93B\">loop yazmak.<\u002Fspan>\"<\u002Fblockquote>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:26px;color:#C7CDDB;margin-top:44px\">— Boris Cherny · Claude Code'un yaratıcısı, Anthropic · Haziran 2026<\u002Fdiv>\n    <div style=\"display:flex;gap:44px;margin-top:40px;flex-wrap:wrap\">\n      <div style=\"font-size:27px;color:#8B94A9\">8 aydır <span style=\"color:#EDF1F9\">elle kod yazmıyor<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:27px;color:#8B94A9\">bazı günler <span style=\"color:#EDF1F9\">on binlerce agent<\u002Fspan> yönetiyor<\u002Fdiv>\n      <div style=\"font-size:27px;color:#8B94A9\">\"builder rolü <span style=\"color:#EDF1F9\">tamamen değişiyor<\u002Fspan>\"<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 14 · STAIRCASE PARADOX ============ -->\n  <section data-label=\"Merdiven\" data-screen-label=\"14 Merdiven paradoksu\" data-speaker-notes=\"Şimdi asıl soru: peki sen ne yapacaksın? Bir paradoksla başlayalım. Eski kariyer merdiveni: bug fix ile kodun nasıl kırıldığını öğrenirdin, CRUD ile veri akışını, feature ile iş mantığını, code review ile başkasının düşüncesini, sonra sistem tasarlardın. Her basamak bir öncekinin üstüne binerdi. AI şu an ilk üç basamağı hızla dönüştürüyor — ve evet, junior seviyede ciddi daralma var, bunu saklamayalım. AMA hikaye tek yönlü değil: yeni mikro-basamaklar doğuyor — prompt tasarlama, çıktı doğrulama, test üretme, spec yazma, agent koordinasyonu. Merdiven yıkılmıyor; yeniden kablolanıyor. Soru şu: yeni basamakları tanıyıp eski derin anlayışı farklı yollarla nasıl edineceksin?\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Peki sen?<\u002Fdiv>\n    <h2 style=\"font-size:66px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 44px\">Merdiven paradoksu<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:44px\">\n      <div>\n        <div style=\"font-size:26px;color:#8B94A9;margin-bottom:22px\">Eski merdiven<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"font-size:28px;color:#C7CDDB;padding:14px 22px;background:rgba(246,185,59,0.07);border-radius:10px;text-decoration:line-through;text-decoration-color:rgba(246,185,59,0.5)\">1 · Bug fix<\u002Fdiv>\n          <div style=\"font-size:28px;color:#C7CDDB;padding:14px 22px;background:rgba(246,185,59,0.07);border-radius:10px;text-decoration:line-through;text-decoration-color:rgba(246,185,59,0.5)\">2 · CRUD endpoint<\u002Fdiv>\n          <div style=\"font-size:28px;color:#C7CDDB;padding:14px 22px;background:rgba(246,185,59,0.07);border-radius:10px;text-decoration:line-through;text-decoration-color:rgba(246,185,59,0.5)\">3 · Feature geliştirme<\u002Fdiv>\n          <div style=\"font-size:28px;color:#EDF1F9;padding:14px 22px;background:#141B2D;border-radius:10px\">4 · Code review<\u002Fdiv>\n          <div style=\"font-size:28px;color:#EDF1F9;padding:14px 22px;background:#141B2D;border-radius:10px\">5 · Sistem tasarımı<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:26px;color:#79E0BE;margin-bottom:22px\">Doğan yeni mikro-basamaklar<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"font-size:28px;color:#EDF1F9;padding:14px 22px;background:#141B2D;border-left:3px solid #79E0BE;border-radius:10px\">Prompt tasarlama<\u002Fdiv>\n          <div style=\"font-size:28px;color:#EDF1F9;padding:14px 22px;background:#141B2D;border-left:3px solid #79E0BE;border-radius:10px\">AI çıktısını doğrulama<\u002Fdiv>\n          <div style=\"font-size:28px;color:#EDF1F9;padding:14px 22px;background:#141B2D;border-left:3px solid #79E0BE;border-radius:10px\">Test senaryosu üretme<\u002Fdiv>\n          <div style=\"font-size:28px;color:#EDF1F9;padding:14px 22px;background:#141B2D;border-left:3px solid #79E0BE;border-radius:10px\">Spec yazma<\u002Fdiv>\n          <div style=\"font-size:28px;color:#EDF1F9;padding:14px 22px;background:#141B2D;border-left:3px solid #79E0BE;border-radius:10px\">Agent koordinasyonu<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:34px;font-size:32px;color:#F6B93B;font-weight:600\">Merdiven yıkılmıyor — basamakları yeniden diziliyor.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 15 · ROADMAP LEVELS ============ -->\n  <section data-label=\"Yol haritası\" data-screen-label=\"15 Yol haritası\" data-speaker-notes=\"İşte seviyelere göre somut yol haritası. Seviye 0 (sıfırdan): temeli atlama, dönüştür. Hesap makinesi çıktı diye matematiği bırakmıyoruz — AI çıktısını değerlendirmek için temeli bilmen şart. 1. günden AI ile proje yap ama her satırın 'neden'ini sor. Seviye 1 (junior): AI'ın çırağı değil, eleştirmeni ol. 'AI'sız 1 saat' kuralı, debugging'i AI'a bırakma — kas hafızanı koru. Seviye 2 (mid): context mühendisi ol, spec-driven development, agent-first deney. Seviye 3 (kıdemli): harness mimarı ol — repo anayasası, test zorunluluğu, katmanlı kısıtlamalar. Kimin hangi seviyede olduğunu sor, o seviyeye vurgu yap.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Sana özel yol haritası<\u002Fdiv>\n    <h2 style=\"font-size:66px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 44px\">Nereden başlayacaksın?<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:22px\">\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:32px 26px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#79E0BE;margin-bottom:14px\">Seviye 0<\u002Fdiv>\n        <div style=\"font-size:27px;font-weight:700;margin-bottom:14px;line-height:1.2\">Sıfırdan başlayan<\u002Fdiv>\n        <div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">Temeli atlama, dönüştür. 1. günden AI ile proje yap; her satırın \"neden\"ini sor.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:32px 26px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#79E0BE;margin-bottom:14px\">Seviye 1<\u002Fdiv>\n        <div style=\"font-size:27px;font-weight:700;margin-bottom:14px;line-height:1.2\">Junior (0–2 yıl)<\u002Fdiv>\n        <div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">AI'ın çırağı değil eleştirmeni ol. \"AI'sız 1 saat\" kuralı; debugging'i bırakma.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:32px 26px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#79E0BE;margin-bottom:14px\">Seviye 2<\u002Fdiv>\n        <div style=\"font-size:27px;font-weight:700;margin-bottom:14px;line-height:1.2\">Mid (2–5 yıl)<\u002Fdiv>\n        <div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">Context mühendisi ol. Spec-driven development; agent-first deney yap.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #F6B93B;border-radius:16px;padding:32px 26px;display:flex;flex-direction:column\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B;margin-bottom:14px\">Seviye 3<\u002Fdiv>\n        <div style=\"font-size:27px;font-weight:700;margin-bottom:14px;line-height:1.2\">Kıdemli yolculuk<\u002Fdiv>\n        <div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">Harness mimarı ol. Repo anayasası, test zorunluluğu, katmanlı kısıtlamalar.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:34px;font-size:29px;color:#8B94A9\">İlerleme artık \"yazdığın kod satırı\" ile değil, <span style=\"color:#EDF1F9\">\"tasarladığın sistem düşüncesi\"<\u002Fspan> ile ölçülüyor.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 16 · 2-WEEK EXERCISE ============ -->\n  <section data-label=\"Egzersiz\" data-screen-label=\"16 Egzersiz\" data-speaker-notes=\"Bunu somuta indirelim — birlikte yapabileceğiniz 2 haftalık plan. Gün 1-3: AI ile bir REST API kurun, veri modelini birlikte tasarlayın ama her kararın nedenini sorgulayın. Gün 4-6: AI'ın yazdığı kodu testlerle kaplayın, her testi okuyup neden o senaryoyu test ettiğini anlayın. Gün 7-10: mimariyi refactor edin, önceki ve sonraki versiyonu karşılaştırın. Gün 11-14: dokümantasyon ve spec yazın. Amaç 'bir şey yapmış olmak' değil — yazılım döngüsünün her aşamasını bilinçli deneyimlemek. Burada isterseniz canlı başlayabiliriz: ilk prompt'u birlikte yazalım.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#C7CDDB;margin-bottom:22px\">## egzersiz · birlikte yapalım<\u002Fdiv>\n    <h2 style=\"font-size:64px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 46px\">2 haftalık plan<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:18px;justify-content:center\">\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:26px 36px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;color:#F6B93B\">Gün 1–3<\u002Fdiv>\n        <div style=\"font-size:30px;color:#EDF1F9\">AI ile bir <span style=\"font-weight:600\">REST API<\u002Fspan> kur — her tasarım kararının \"neden\"ini sorgula.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:26px 36px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;color:#F6B93B\">Gün 4–6<\u002Fdiv>\n        <div style=\"font-size:30px;color:#EDF1F9\">Kodu <span style=\"font-weight:600\">testlerle<\u002Fspan> kapla — her testin neyi test ettiğini oku.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:26px 36px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;color:#F6B93B\">Gün 7–10<\u002Fdiv>\n        <div style=\"font-size:30px;color:#EDF1F9\">Mimariyi <span style=\"font-weight:600\">refactor<\u002Fspan> et — önce/sonra versiyonu karşılaştır.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:26px 36px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;color:#F6B93B\">Gün 11–14<\u002Fdiv>\n        <div style=\"font-size:30px;color:#EDF1F9\"><span style=\"font-weight:600\">Dokümantasyon + spec<\u002Fspan> yaz — hangi kararı neden aldığını belgele.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:30px;font-size:28px;color:#79E0BE\">Amaç \"bir şey yapmış olmak\" değil — döngünün her aşamasını bilinçli yaşamak.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 17 · FIVE CONSTANTS ============ -->\n  <section data-label=\"Beş temel\" data-screen-label=\"17 Beş temel\" data-speaker-notes=\"Hangi seviyede olursanız olun, yeni dünyada değişmeyen beş temel. Bir: analitik düşünme her şeyin üstünde — AI syntax üretir ama 'bu problemi nasıl parçalarım' sorusunu siz sorarsınız. İki: sürekli öğrenme artık lüks değil, hayatta kalma becerisi. Üç: iletişim koddan değerli — agent'lara iş tanımlayacaksınız, spec yazacaksınız. Dört: T-shaped profil — geniş bilgi, tek alanda derinlik; farkınızı derinliğiniz yaratır. Beş: deneyim = deney sayısı. Hata maliyeti çok düştü; daha çok deneyin, daha çok bozun, merakınızı compile edin.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Ne olursa olsun<\u002Fdiv>\n    <h2 style=\"font-size:66px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 46px\">Değişmeyen beş temel<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center\">\n      <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:14px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:34px;color:#F6B93B;min-width:52px\">01<\u002Fspan><div style=\"font-size:32px\"><span style=\"font-weight:600\">Analitik düşünme<\u002Fspan> her şeyin üstünde <span style=\"color:#8B94A9\">— AI syntax üretir, problemi sen parçalarsın<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:14px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:34px;color:#F6B93B;min-width:52px\">02<\u002Fspan><div style=\"font-size:32px\"><span style=\"font-weight:600\">Sürekli öğrenme<\u002Fspan> = hayatta kalma becerisi <span style=\"color:#8B94A9\">— öğrenmeyi öğrenmek eskimez<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:14px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:34px;color:#F6B93B;min-width:52px\">03<\u002Fspan><div style=\"font-size:32px\"><span style=\"font-weight:600\">İletişim<\u002Fspan>, koddan değerli <span style=\"color:#8B94A9\">— spec, tasarım dokümanı, net gereksinim<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:14px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:34px;color:#F6B93B;min-width:52px\">04<\u002Fspan><div style=\"font-size:32px\"><span style=\"font-weight:600\">T-shaped<\u002Fspan> profil <span style=\"color:#8B94A9\">— geniş bilgi, derin uzmanlık; farkını derinlik yaratır<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:28px;align-items:baseline;padding-bottom:2px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:34px;color:#F6B93B;min-width:52px\">05<\u002Fspan><div style=\"font-size:32px\"><span style=\"font-weight:600\">Deneyim = deney sayısı<\u002Fspan> <span style=\"color:#8B94A9\">— daha çok dene, boz, merakını compile et<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 18 · FUTURE ROLES ============ -->\n  <section data-label=\"Geleceğin rolleri\" data-screen-label=\"18 Geleceğin rolleri\" data-speaker-notes=\"Peki 'builder' olmak tam olarak ne demek? Boris Cherny çok net bir gözlem paylaştı: mühendislik, ürün, tasarım, veri bilimi — hepsi tek bir yeni tür role eriyor. Claude Code ekibinde beş temel rol görüyor. Prototyper: yeni fikirler üretir, çoğu yayınlanmaz ama kıvılcım buradan çıkar. Builder: fikri hızla production-grade ürüne çevirir. Sweeper: UI'ı temizler, sistemi sadeleştirir, performansı iyileştirir. Grower: ürünü iterasyonla Product-Market Fit'e taşır. Maintainer: olgun sistemi güvenli, güvenilir ve hızlı tutar. En önemlisi: bu roller iş fonksiyonuna bağlı DEĞİL — bir tasarımcı da mühendis de PM de herhangi biri olabilir; çoğu kişi 2-3 rolü birden kapsar. Kendinize sorun: hangi role daha yakınsınız? Sağlıklı bir ekip bu rollerin karışımına ihtiyaç duyar.\" style=\"background:#0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:88px 104px 76px;display:flex;flex-direction:column\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B;margin-bottom:22px\">Gelecek · yeni roller<\u002Fdiv>\n    <h2 style=\"font-size:62px;line-height:1.05;font-weight:700;letter-spacing:-1.5px;margin:0 0 14px\">İş tanımları eriyor — roller doğuyor<\u002Fh2>\n    <p style=\"font-size:29px;color:#8B94A9;margin:0 0 40px\">Mühendislik, ürün, tasarım tek bir role eriyor. Yarının işi beş temel rol etrafında şekilleniyor:<\u002Fp>\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:18px\">\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #F6B93B;border-radius:16px;padding:30px 24px;display:flex;flex-direction:column\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">01<\u002Fdiv><div style=\"font-size:28px;font-weight:700;color:#F6B93B;margin-bottom:14px\">Prototyper<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">Yeni fikirler üretir; çoğu yayınlanmaz — ama kıvılcım buradan çıkar<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #F6B93B;border-radius:16px;padding:30px 24px;display:flex;flex-direction:column\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">02<\u002Fdiv><div style=\"font-size:28px;font-weight:700;color:#F6B93B;margin-bottom:14px\">Builder<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">Fikri hızla production-grade bir ürüne çevirir<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #F6B93B;border-radius:16px;padding:30px 24px;display:flex;flex-direction:column\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">03<\u002Fdiv><div style=\"font-size:28px;font-weight:700;color:#F6B93B;margin-bottom:14px\">Sweeper<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">UI'ı temizler, sistemi sadeleştirir, performansı iyileştirir<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #79E0BE;border-radius:16px;padding:30px 24px;display:flex;flex-direction:column\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">04<\u002Fdiv><div style=\"font-size:28px;font-weight:700;color:#79E0BE;margin-bottom:14px\">Grower<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">Ürünü iterasyonla Product-Market Fit'e taşır<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#141B2D;border:1px solid rgba(255,255,255,0.09);border-top:3px solid #79E0BE;border-radius:16px;padding:30px 24px;display:flex;flex-direction:column\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#8B94A9;margin-bottom:14px\">05<\u002Fdiv><div style=\"font-size:28px;font-weight:700;color:#79E0BE;margin-bottom:14px\">Maintainer<\u002Fdiv><div style=\"font-size:24px;color:#C7CDDB;line-height:1.45\">Olgun sistemi güvenli, güvenilir ve hızlı tutar<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:34px;font-size:27px;color:#8B94A9\">Roller iş fonksiyonuna bağlı değil — <span style=\"color:#EDF1F9\">herkes herhangi biri olabilir, çoğu 2–3 rolü kapsar.<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#8B94A9\">  — Boris Cherny gözlemi<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 19 · CLOSING ============ -->\n  <section data-label=\"Kapanış\" data-screen-label=\"19 Kapanış\" data-speaker-notes=\"Kapanış. Net söylüyorum: syntax hamallığı bitiyor ama asıl mühendislik yeni başlıyor. Mühendis, tasarımcı, PM gibi unvanlar tek bir 'builder' kimliğinde eriyor — az önce konuştuğumuz beş rolde. Değer artık koddan değil; problem çözmekten, sistem tasarlamaktan ve doğrulamaktan geliyor. Umutsuzluğa yer yok — teknoloji her zaman gelişti ve daha da gelişecek; kazanan, çalışan, araştıran, öğrenen olacak. Tıpkı arzuhalciler meydanlardan çekildiğinde yazının bitmemesi, edebiyatçıların, gazetecilerin doğması gibi — ama onlar da önce okuma yazmayı öğrenerek başladılar. Temeli atlamadılar, dönüştürdüler. Bugün tarih kitaplarına girecek bir dönüşümü içeriden yaşıyorsunuz. Sizinle çok daha büyük işler başaracağız. Teşekkürler — sorular ve birlikte denemek için buradayım.\" style=\"background:radial-gradient(1300px 800px at 22% 90%, rgba(246,185,59,0.13), transparent 58%), radial-gradient(900px 560px at 88% 8%, rgba(121,224,190,0.08), transparent 60%), #0B0F1A;color:#EDF1F9;font-family:'Space Grotesk',system-ui,sans-serif;padding:96px 104px 84px;display:flex;flex-direction:column;justify-content:space-between\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#F6B93B\">Kapanış<\u002Fdiv>\n    <div>\n      <h2 style=\"font-size:88px;line-height:1.04;font-weight:700;letter-spacing:-3px;margin:0 0 34px\">Syntax hamallığı bitiyor.<br>Asıl mühendislik başlıyor.<\u002Fh2>\n      <p style=\"font-size:34px;line-height:1.45;color:#C7CDDB;margin:0;max-width:1500px\">Unvanlar tek bir <span style=\"color:#EDF1F9;font-weight:600\">\"builder\"<\u002Fspan> kimliğinde eriyor — prototipleyen, inşa eden, büyüten. Değer artık koddan değil; problem çözmekten, sistem tasarlamaktan ve doğrulamaktan geliyor. Umutsuzluğa yer yok — teknoloji hep gelişecek; <span style=\"color:#79E0BE;font-weight:600\">çalışan, araştıran, öğrenen kazanır.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-size:34px;line-height:1.4;color:#EDF1F9;font-style:italic;margin:0 0 34px;max-width:1450px\">\"Hello World demeyeceğiz belki ama, emin ol seninle çok daha büyük işler başaracağız.\"<\u002Fp>\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(255,255,255,0.12);padding-top:28px\">\n        <div style=\"font-size:28px\">Mehmet Cevheri Bozoğlan<span style=\"color:#8B94A9\"> · AI Tech Lead @ PiA<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:#F6B93B\">cevheri.medium.com<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
